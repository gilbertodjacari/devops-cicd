name: Primeiro Workflow

on:
  push:
    branches: [ main ]

jobs:
  teste:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build Aplicação
        run: echo "Buildando a Aplicação"

  dev:
    runs-on: ubuntu-latest
    needs: teste
    steps:
      - name: Fase de Desenvolvimento
        run: echo "Deploy no ambiente de desenvolvimento"

  qa:
    runs-on: ubuntu-latest
    needs: teste
    steps:
      - name: Fase de Testes e Qualidade
        run: echo "Executar os testes de Qualidade"

  homologacao:
    runs-on: ubuntu-latest
    needs:
      - dev
      - qa
    steps:
      - name: Deploy Homol
        run: echo "Executando deploy no ambiente de Homologação"

  producao:
    runs-on: ubuntu-latest
    needs: homologacao
    steps:
      - name: Deploy producao
        run: echo "Executando deploy em PRD"